<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <title>Input Kegiatan Rapat</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <style>
      body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
       background: linear-gradient(135deg, #ffeb3b 0%, #fbc02d 100%);

        min-height: 100vh;
        margin: 0;
        padding: 20px;
      }
      .header {
        text-align: center;
        background: #fff;
        padding: 20px;
        border-radius: 15px;
        margin-bottom: 20px;
        box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        max-width: 800px;
        margin-left: auto;
        margin-right: auto;
      }
      .logos {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 20px;
        margin-bottom: 15px;
      }
      .logo {
        width: 80px;
        height: 80px;
        object-fit: contain;
      }
      .office-name {
        font-size: 18px;
        font-weight: bold;
        color: #2d3748;
        margin: 0;
      }
      .office-subtitle {
        font-size: 14px;
        color: #718096;
        margin: 5px 0 0 0;
      }
      .container {
        max-width: 800px;
        margin: auto;
        background: #ffffff;
        padding: 30px;
        border-radius: 15px;
        box-shadow: 0 8px 32px rgba(0,0,0,0.1);
      }
      .form-title {
        text-align: center;
        color: #2d3748;
        margin-bottom: 30px;
        font-size: 24px;
        font-weight: 600;
      }
      .form-group {
        margin-bottom: 20px;
      }
      .form-label {
        font-weight: 600;
        color: #4a5568;
        margin-bottom: 8px;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .form-control {
        border: 2px solid #e2e8f0;
        border-radius: 8px;
        padding: 12px 16px;
        font-size: 14px;
        transition: border-color 0.3s ease;
      }
      .form-control:focus {
        border-color: #667eea;
        box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
      }
      .btn-primary {
        background: linear-gradient(135deg, #007bff 0%, #0056b3 100%);
        border: none;
        padding: 12px 30px;
        border-radius: 8px;
        font-weight: 600;
        transition: transform 0.2s ease;
      }
      .btn-primary:hover {
        transform: translateY(-2px);
        background: linear-gradient(135deg, #0056b3 0%, #004085 100%);
      }
      .btn-primary:disabled {
        background: #a0aec0;
        transform: none;
      }
      .note {
        font-size: 13px;
        color: #718096;
        text-align: center;
        margin-top: 15px;
        padding: 10px;
        background: #f7fafc;
        border-radius: 6px;
      }
      .back-link {
        display: inline-block;
        margin-bottom: 20px;
        color: #667eea;
        text-decoration: none;
        font-weight: 500;
        transition: color 0.3s ease;
      }
      .back-link:hover {
        color: #5a67d8;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <div class="logos">
        <img src="assets/pu.png" alt="Logo PU" class="logo">
        <img src="assets/bintan.png" alt="Logo PEMDA Bintan" class="logo">
      </div>
      <h1 class="office-name">PEMERINTAH KABUPATEN BINTAN</h1>
      <h2 class="office-subtitle">DINAS PEKERJAAN UMUM, PENATAAN RUANG DAN PERTANAHAN</h2>
    </div>

    <div class="container">
      <h1 class="form-title"><strong>Form Input Kegiatan Rapat</strong></h1>
      <a href="daftarrapat.html" class="back-link"><i class="bi bi-arrow-left"></i> Kembali ke Daftar Rapat</a>

      <form id="formRapat">
        <div class="row">
          <div class="col-md-6">
            <div class="form-group">
              <label class="form-label"><i class="bi bi-tag"></i> Jenis Rapat</label>
              <select name="jenis_rapat" class="form-control" required>
                <option value="">-- Pilih Jenis Rapat --</option>
                <option value="Internal">Internal</option>
                <option value="Eksternal">Eksternal</option>
              </select>
            </div>
          </div>
          <div class="col-md-6">
            <div class="form-group">
              <label class="form-label"><i class="bi bi-building"></i> Instansi / Bidang</label>
              <input
                type="text"
                name="instansi"
                class="form-control"
                placeholder="Contoh: Bidang Bina Marga"
                required
              />
            </div>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label"><i class="bi bi-calendar-event"></i> Nama Kegiatan</label>
          <input type="text" name="nama_kegiatan" class="form-control" required />
        </div>

        <div class="row">
          <div class="col-md-6">
            <div class="form-group">
              <label class="form-label"><i class="bi bi-clock"></i> Waktu Rapat</label>
              <input type="datetime-local" name="waktu" class="form-control" required />
            </div>
          </div>
          <div class="col-md-6">
            <div class="form-group">
              <label class="form-label"><i class="bi bi-file-text"></i> Judul Rapat</label>
              <input type="text" name="judul" class="form-control" required />
            </div>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label"><i class="bi bi-pencil-square"></i> Isi Rapat</label>
          <textarea name="isi" class="form-control" rows="4" required></textarea>
        </div>

        <div class="row">
          <div class="col-md-4">
            <div class="form-group">
              <label class="form-label"><i class="bi bi-file-earmark-pdf"></i> Upload Dokumentasi</label>
              <input
                type="file"
                id="fileDokumentasi"
                class="form-control"
                accept=".pdf,.jpg,.png"
                required
              />
              <small class="text-muted">PDF / JPG / PNG</small>
            </div>
          </div>
          <div class="col-md-4">
            <div class="form-group">
              <label class="form-label"><i class="bi bi-people"></i> Upload Daftar Hadir</label>
              <input type="file" id="fileHadir" class="form-control" accept=".pdf,.jpg,.png" required />
              <small class="text-muted">PDF / JPG / PNG</small>
            </div>
          </div>
          <div class="col-md-4">
            <div class="form-group">
              <label class="form-label"><i class="bi bi-journal-text"></i> Upload Notulen Rapat</label>
              <input type="file" id="fileNotulen" class="form-control" accept=".pdf,.jpg,.png" required />
              <small class="text-muted">PDF / JPG / PNG</small>
            </div>
          </div>
        </div>

        <div class="text-center mt-4">
          <button type="submit" class="btn btn-primary" id="btnSubmit">
            <i class="bi bi-save"></i> Simpan Data Rapat
          </button>
        </div>
        <div class="note">
          <i class="bi bi-info-circle"></i> File tersimpan di Google Drive & data ke Spreadsheet
        </div>
      </form>
    </div>

    <!-- Modal Bootstrap -->
    <div class="modal fade" id="submitModal" tabindex="-1" aria-labelledby="submitModalLabel" aria-hidden="true">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="submitModalLabel">Status Pengiriman</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body" id="modalBody">
            <!-- Content will be set by JS -->
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Tutup</button>
          </div>
        </div>
      </div>
    </div>

    <script>
      const form = document.getElementById("formRapat");
      const btn = document.getElementById("btnSubmit");
      const modal = new bootstrap.Modal(document.getElementById('submitModal'));
      const modalBody = document.getElementById('modalBody');

      function toBase64(file) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => resolve(reader.result.split(",")[1]);
          reader.onerror = reject;
          reader.readAsDataURL(file);
        });
      }

      function showModal(message, type = 'success') {
        modalBody.innerHTML = `<div class="alert alert-${type}" role="alert">${message}</div>`;
        modal.show();
      }

      form.addEventListener("submit", async function (e) {
        e.preventDefault();

        const dokumentasi = document.getElementById("fileDokumentasi").files[0];
        const hadir = document.getElementById("fileHadir").files[0];
        const notulen = document.getElementById("fileNotulen").files[0];

        if (!dokumentasi || !hadir || !notulen) {
          showModal("Semua file wajib diupload", "warning");
          return;
        }

        btn.disabled = true;
        btn.innerText = "Menyimpan...";

        const fd = new FormData();
        fd.append("jenis_rapat", form.jenis_rapat.value);
        fd.append("instansi", form.instansi.value);
        fd.append("nama_kegiatan", form.nama_kegiatan.value);
        fd.append("waktu", form.waktu.value);
        fd.append("judul", form.judul.value);
        fd.append("isi", form.isi.value);

        // ===== KONVERSI FILE KE BASE64 =====
        fd.append("dokumentasi", await toBase64(dokumentasi));
        fd.append("dokumentasi_name", dokumentasi.name);
        fd.append("dokumentasi_type", dokumentasi.type);

        fd.append("hadir", await toBase64(hadir));
        fd.append("hadir_name", hadir.name);
        fd.append("hadir_type", hadir.type);

        fd.append("notulen", await toBase64(notulen));
        fd.append("notulen_name", notulen.name);
        fd.append("notulen_type", notulen.type);

        fetch(
          "https://script.google.com/macros/s/AKfycbzMeA4ReCuxaGv87mw0lPTSOYuwSPPwvWLwhkNiackGtwo7jkICam92glZcrcczgcnL/exec",
          {
            method: "POST",
            body: fd,
          }
        )
          .then(() => {
            showModal("Data rapat berhasil disimpan");
            form.reset();
          })
          .catch(() => {
            showModal("Gagal mengirim data", "danger");
          })
          .finally(() => {
            btn.disabled = false;
            btn.innerText = "Simpan Data Rapat";
          });
      });
    </script>
  </body>
</html>
