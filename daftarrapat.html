<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <title>Daftar Kegiatan Rapat</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <style>
      body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #ffeb3b 0%, #fbc02d 100%);
        min-height: 100vh;
        margin: 0;
        padding: 20px;
      }
      .header {
        text-align: center;
        background: #fff;
        padding: 20px;
        border-radius: 15px;
        margin-bottom: 20px;
        box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        max-width: 800px;
        margin-left: auto;
        margin-right: auto;
      }
      .logos {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 20px;
        margin-bottom: 15px;
      }
      .logo {
        width: 80px;
        height: 80px;
        object-fit: contain;
      }
      .office-name {
        font-size: 18px;
        font-weight: bold;
        color: #2d3748;
        margin: 0;
      }
      .office-subtitle {
        font-size: 14px;
        color: #718096;
        margin: 5px 0 0 0;
      }
      .container {
        max-width: 800px;
        margin: auto;
        background: #ffffff;
        padding: 30px;
        border-radius: 15px;
        box-shadow: 0 8px 32px rgba(0,0,0,0.1);
      }
      .form-title {
        text-align: center;
        color: #2d3748;
        margin-bottom: 30px;
        font-size: 24px;
        font-weight: 600;
      }
      .form-group {
        margin-bottom: 20px;
      }
      .form-label {
        font-weight: 600;
        color: #4a5568;
        margin-bottom: 8px;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .form-control {
        border: 2px solid #e2e8f0;
        border-radius: 8px;
        padding: 12px 16px;
        font-size: 14px;
        transition: border-color 0.3s ease;
      }
      .form-control:focus {
        border-color: #667eea;
        box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
      }
      .btn-primary {
        background: linear-gradient(135deg, #007bff 0%, #0056b3 100%);
        border: none;
        padding: 12px 30px;
        border-radius: 8px;
        font-weight: 600;
        transition: transform 0.2s ease;
      }
      .btn-primary:hover {
        transform: translateY(-2px);
        background: linear-gradient(135deg, #0056b3 0%, #004085 100%);
      }
      .btn-primary:disabled {
        background: #a0aec0;
        transform: none;
      }
      .note {
        font-size: 13px;
        color: #718096;
        text-align: center;
        margin-top: 15px;
        padding: 10px;
        background: #f7fafc;
        border-radius: 6px;
      }
      .back-link {
        display: inline-block;
        margin-bottom: 20px;
        color: #667eea;
        text-decoration: none;
        font-weight: 500;
        transition: color 0.3s ease;
      }
      .back-link:hover {
        color: #5a67d8;
      }
      .toolbar {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        margin-bottom: 15px;
      }
      input {
        padding: 8px;
        border: 1px solid #cbd5e1;
        border-radius: 6px;
      }
      button,
      .button {
        background: #2563eb;
        color: #fff;
        border: none; 
        padding: 8px 14px;
        border-radius: 6px;
        text-decoration: none;
        cursor: pointer;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 10px;
        font-size: 14px;
      }
      .delete-btn {
        background: #dc2626;
        color: #fff;
        border: none;
        padding: 6px 10px;
        border-radius: 4px;
        cursor: pointer;
        font-size: 12px;
      }
      .delete-btn:hover {
        background: #b91c1c;
      }
      th,
      td {
        border: 1px solid #e5e7eb;
        padding: 10px;
        vertical-align: top;
      }
      th:nth-child(5), td:nth-child(5) {
        width: 10%;
      }
      th:nth-child(6), td:nth-child(6) {
        width: 10%;
      }
      th:nth-child(7), td:nth-child(7) {
        width: 25%;
      }
      th {
        background: #2563eb;
        color: #fff;
      }
      img.qr {
        width: 70px;
        margin-top: 5px;
      }

      .folder-cell {
        text-align: center;
        vertical-align: middle;
      }

      .folder-box {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
      }

      .btn-link:hover {
        text-decoration: underline;
      }

      .qr-wrapper img {
        border: 1px solid #ddd;
        border-radius: 8px;
        padding: 6px;
        background: #fff;
        transition: transform 0.2s ease;
      }

      .qr-wrapper img:hover {
        transform: scale(1.05);
      }

      .empty {
        color: #999;
        font-style: italic;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <div class="logos">
        <img src="assets/pu.png" alt="Logo PU" class="logo">
        <img src="assets/bintan.png" alt="Logo PEMDA Bintan" class="logo">
      </div>
      <h1 class="office-name">PEMERINTAH KABUPATEN BINTAN</h1>
      <p class="office-subtitle">DINAS PEKERJAAN UMUM, PENATAAN RUANG DAN PERTANAHAN</p>
    </div>

    <div class="container">
      <h1 class="form-title"><strong>Daftar Kegiatan Rapat</strong></h1>
      <div class="toolbar">
        <input type="text" id="search" placeholder="Cari data rapat" />
        <input type="date" id="filterTanggal" />
        <button class="button" onclick="window.location.href='index.html'">+ Input Rapat</button>
      </div>

      <table id="tabelRapat">
        <thead>
          <tr>
            <th>No</th>
            <th>Jenis</th>
            <th>Instansi / Bidang</th>
            <th>Nama Kegiatan</th>
            <th>Waktu</th>
            <th>Judul</th>
            <th>Isi</th>
            <th>Evidence</th>
            <th>Aksi</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>

    <script>
      let dataRapat = [];

      // === FORMAT WAKTU WIB ===
      function formatWIB(dateStr) {
        if (!dateStr) return "-";

        const d = new Date(dateStr);
        if (isNaN(d)) return dateStr; // kalau bukan format tanggal

        return d.toLocaleString("id-ID", {
          timeZone: "Asia/Jakarta",
          day: "2-digit",
          month: "long",
          year: "numeric",
          hour: "2-digit",
          minute: "2-digit",
        }) + " WIB";
      }

      // === AMBIL DATA DARI APPS SCRIPT ===
      fetch(
        "https://script.google.com/macros/s/AKfycbzMeA4ReCuxaGv87mw0lPTSOYuwSPPwvWLwhkNiackGtwo7jkICam92glZcrcczgcnL/exec"
      )
        .then((res) => res.text())
        .then((text) => {
          dataRapat = JSON.parse(text);
          render(dataRapat);
        })
        .catch((err) => {
          alert("Gagal mengambil data rapat");
          console.error(err);
        });

      function render(data) {
        const tbody = document.querySelector("tbody");
        tbody.innerHTML = "";

        data.forEach((d, index) => {
          tbody.innerHTML += `
        <tr>
          <td>${d.no}</td>
          <td>${d.jenis_rapat || "-"}</td>
          <td>${d.instansi || "-"}</td>
          <td>${d.nama_kegiatan || "-"}</td>
          <td>${formatWIB(d.waktu)}</td>
          <td>${d.judul || "-"}</td>
          <td>${d.isi || "-"}</td>
         <td class="folder-cell">
          ${
            d.link_folder
              ? `
                <div class="folder-box">
                  <a href="${d.link_folder}" target="_blank" class="btn-link">
                    Lihat Folder
                  </a>

                  <a href="https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${encodeURIComponent(
                    d.link_folder
                  )}"
                    target="_blank"
                    download="QR-Folder-Rapat.png"
                    class="qr-wrapper">

                    <img class="qr"
                        src="https://api.qrserver.com/v1/create-qr-code/?size=110x110&data=${encodeURIComponent(
                          d.link_folder
                        )}"
                        alt="QR Folder Rapat">
                  </a>
                </div>
              `
              : `<em class="empty">Folder belum tersedia</em>`
          }
        </td>
        <td><button class="delete-btn" onclick="deleteRapat(${index})">Hapus</button></td>

        </tr>
      `;
        });
      }

      // === SEARCH ===
      document.getElementById("search").addEventListener("input", (e) => {
        const q = e.target.value.toLowerCase();
        render(
          dataRapat.filter((d) => JSON.stringify(d).toLowerCase().includes(q))
        );
      });

      // === FILTER TANGGAL (WIB) ===
      document
        .getElementById("filterTanggal")
        .addEventListener("change", (e) => {
          const tgl = e.target.value;
          render(dataRapat.filter((d) => d.waktu && d.waktu.startsWith(tgl)));
        });

      // === DELETE RAPAT ===
      function deleteRapat(index) {
        if (confirm("Apakah Anda yakin ingin menghapus rapat ini?")) {
          const no = dataRapat[index].no;
          const fd = new FormData();
          fd.append("action", "delete");
          fd.append("no", no);

          fetch("https://script.google.com/macros/s/AKfycbzMeA4ReCuxaGv87mw0lPTSOYuwSPPwvWLwhkNiackGtwo7jkICam92glZcrcczgcnL/exec", {
            method: "POST",
            body: fd
          })
            .then(res => res.text())
            .then(text => {
              if (text.includes("success") || text === "OK" || text.trim() === "") {
                dataRapat.splice(index, 1);
                render(dataRapat);
                alert("Data dan folder berhasil dihapus dari spreadsheet dan Google Drive.");
              } else {
                alert("Gagal menghapus data dari spreadsheet: " + text);
              }
            })
            .catch(err => {
              alert("Error menghapus data.");
              console.error(err);
            });
        }
      }
    </script>
  </body>
</html>
